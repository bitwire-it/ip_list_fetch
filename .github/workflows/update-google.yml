name: Update Google IP exclusion list

on:
  workflow_dispatch:
  schedule:
    # Google ranges change infrequently; refresh once a day.
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  update_google:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate google.txt (goog - cloud)
        run: python3 generate_google.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Automated update of Google IP exclusion list
          file_pattern: google.txt
